<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QIQA Demo Login</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, Arial, sans-serif;
        color: #10203a;
        background: #eef4fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(90deg, rgba(6, 24, 50, 0.92), rgba(11, 88, 114, 0.72)),
          url("https://images.unsplash.com/photo-1576091160550-2173dba999ef?auto=format&fit=crop&w=1800&q=80");
        background-size: cover;
        background-position: center;
      }

      .loginShell {
        width: min(460px, 100%);
        border: 1px solid #dbe5f1;
        border-radius: 12px;
        background: #fff;
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.24);
        padding: 28px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 22px;
        color: #0b4d89;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .brandMark {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: #0b4d89;
        color: #fff;
      }

      h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.1;
      }

      p {
        margin: 10px 0 0;
        color: #52627a;
        line-height: 1.5;
      }

      form {
        display: grid;
        gap: 14px;
        margin-top: 24px;
      }

      label {
        display: grid;
        gap: 6px;
        color: #24344d;
        font-size: 13px;
        font-weight: 800;
      }

      input {
        width: 100%;
        border: 1px solid #c9d7e8;
        border-radius: 8px;
        padding: 12px;
        font: inherit;
      }

      button {
        border: 0;
        border-radius: 8px;
        background: #172033;
        color: #fff;
        padding: 12px 16px;
        font-weight: 900;
        cursor: pointer;
      }

      .hint {
        margin-top: 18px;
        border: 1px solid #bfdbfe;
        border-radius: 10px;
        background: #eff6ff;
        padding: 12px;
        color: #1e3a8a;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main class="loginShell">
      <div class="brand"><span class="brandMark">Q</span> QIQA demo access</div>
      <h1>Sign in to test protected online forms</h1>
      <p>This is a demo-only login gate for Chrome extension testing. No credentials are sent to a server.</p>

      <form id="loginForm">
        <label>
          Email
          <input id="email" type="email" autocomplete="username" value="tester@qiqa.demo" required>
        </label>
        <label>
          Password
          <input type="password" autocomplete="current-password" value="demo-password" required>
        </label>
        <button type="submit">Sign in to demo forms</button>
      </form>

      <div class="hint">Any email and password will work. This page only sets a browser-session flag so protected demo forms can be opened.</div>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const next = params.get("next") || "target-form.html";

      document.getElementById("loginForm").addEventListener("submit", (event) => {
        event.preventDefault();
        sessionStorage.setItem("qiqaDemoAuthenticated", "true");
        sessionStorage.setItem("qiqaDemoUser", document.getElementById("email").value || "tester@qiqa.demo");
        window.location.href = next;
      });
    </script>
  </body>
</html>
